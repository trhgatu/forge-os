name: Forge OS - Backend Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  ci-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔧 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install
        run: pnpm install --no-frozen-lockfile

      - name: 🧹 Lint & Build Test
        run: |
          pnpm turbo lint --filter=@forge/api
          pnpm turbo build --filter=@forge/api

  cd-deploy:
    needs: ci-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            trhgatu/forge-os-backend:${{ github.ref_name }}
            ${{ github.ref_name == 'main' && 'trhgatu/forge-os-backend:latest' || '' }}
          cache-from: type=registry,ref=trhgatu/forge-os-backend:buildcache
          cache-to: type=registry,ref=trhgatu/forge-os-backend:buildcache,mode=max

      - name: 🚀 Trigger redeploy on Render
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}
          fi